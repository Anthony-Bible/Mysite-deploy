apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysite-prod-deployment
  namespace: default
  labels:
    app: mysite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mysite
      phase: "prod"
  template:
    metadata:
      annotations:
        iam.amazonaws.com/role: arn:aws:iam::842805395457:role/Test_ec2ForSDK
        linkerd.io/inject: enabled
      labels:
        app: mysite
        name: mysite
        phase: "prod"
        version: "v0.1.0"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["mysite"]
              topologyKey: kubernetes.io/hostname
      initContainers:
      # Pull /mysite/prod/* parameters from AWS SSM into /var/www/html/.env
      # (mirrors the legacy ~/Cluster/mysite-dev.yml initContainer wiring)
      - name: setup
        image: ghcr.io/anthony-bible/mysite-prod@sha256:789cbd1aad8be6baf2171d800f00e8a7571e070c79d9a6aee2e11331221f78bb
        command:
          - sh
          - -c
          - |
            set -eu
            apt-get update && apt-get install -y --no-install-recommends awscli rsync || \
              (apk add --no-cache aws-cli rsync 2>/dev/null || true)
            aws configure set default.region us-west-2
            aws ssm get-parameters-by-path \
              --path /mysite/prod/ --recursive --with-decryption \
              --output text \
              --query "Parameters[].[Name,Value]" \
              | sed -E 's#/mysite/prod/([^[:space:]]*)[[:space:]](.*)#export \1="\2"#' \
              | sed -E 's/(export)([[:space:]].*=)/\1\U\2/' > /shared/.env
            rsync -a /root/.aws/ /aws-out/ 2>/dev/null || true
        volumeMounts:
        - name: env
          mountPath: /shared
      containers:
      - name: mysite
        image: ghcr.io/anthony-bible/mysite-prod@sha256:789cbd1aad8be6baf2171d800f00e8a7571e070c79d9a6aee2e11331221f78bb
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cp /shared/.env /var/www/html/.env 2>/dev/null || true; apache2-foreground"]
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        volumeMounts:
        - name: env
          mountPath: /shared
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "10m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: env
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysite-prod-service
  namespace: default
  annotations:
    # external-dns.alpha.kubernetes.io/hostname: abible.dev  # TODO: set hostname
spec:
  selector:
    app: mysite
    phase: "prod"
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
